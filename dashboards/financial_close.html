const fmtCurrency = (v) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(v);

const StatusBadge = ({ status, small }) => {
  const map = {
    'complete':    { bg: '#86B596', color: '#FFFFFF',  label: 'COMPLETE'    },
    'in-progress': { bg: '#E2C06B', color: '#13212C',  label: 'IN PROGRESS' },
    'not-started': { bg: '#36677D', color: '#FFFFFF',  label: 'NOT STARTED' },
    'blocked':     { bg: '#FF8675', color: '#FFFFFF',  label: 'BLOCKED'     },
  };
  const s = map[status] || map['not-started'];
  return (
    <span style={{ padding: small ? '0.15rem 0.5rem' : '0.25rem 0.75rem', borderRadius: '12px', fontSize: '0.75rem', fontWeight: 500, textTransform: 'uppercase', letterSpacing: '0.025em', display: 'inline-block', whiteSpace: 'nowrap', background: s.bg, color: s.color }}>
      {s.label}
    </span>
  );
};

const PriorityBadge = ({ priority }) => {
  const map = { high: { bg: ns.rose, color: ns.white, label: 'HIGH' }, medium: { bg: ns.yellow, color: ns.ocean180, label: 'MEDIUM' }, low: { bg: ns.pine, color: ns.white, label: 'LOW' } };
  const s = map[priority] || map.low;
  return (
    <span style={{ padding: '0.25rem 0.75rem', borderRadius: '12px', fontSize: '0.75rem', fontWeight: 500, textTransform: 'uppercase', display: 'inline-block', whiteSpace: 'nowrap', background: s.bg, color: s.color }}>

    </span>
  );
};

// ── Main Component ──
const FinancialCloseDashboard = () => {
  const [selectedPeriod, setSelectedPeriod] = useState('December 2025 Close');
  const [selectedView, setSelectedView]     = useState('workflow');
  const [tasks, setTasks]                   = useState(initialTasks);
  const [expandedStages, setExpandedStages] = useState({ stage1: true, stage2: true, stage3: false, stage4: false, stage5: false, stage6: false });

  const toggleTaskStatus = (taskId) => {
    const cycle = { 'not-started': 'in-progress', 'in-progress': 'complete', 'complete': 'not-started', 'blocked': 'in-progress' };
    setTasks(tasks.map(t => t.id === taskId ? { ...t, status: cycle[t.status] } : t));
  };

  const toggleStage = (id) => setExpandedStages(prev => ({ ...prev, ['stage' + id]: !prev['stage' + id] }));

  const stats = useMemo(() => {
    const total         = tasks.length;
    const completed     = tasks.filter(t => t.status === 'complete').length;
    const inProgress    = tasks.filter(t => t.status === 'in-progress').length;
    const blocked       = tasks.filter(t => t.status === 'blocked').length;
    const dueToday      = tasks.filter(t => t.daysUntil === 0).length;
    const overdue       = tasks.filter(t => t.daysUntil < 0 && t.status !== 'complete').length;
    const completionPct = Math.round((completed / total) * 100);
    return { total, completed, inProgress, blocked, dueToday, overdue, completionPct };
  }, [tasks]);

  const closeStatus = (() => {
    if (stats.blocked > 0 || stats.overdue > 0) return { label: 'AT RISK',     bg: ns.rose     };
    if (stats.completionPct === 100)             return { label: 'COMPLETE',    bg: ns.pine     };
    if (stats.completionPct >= 50)               return { label: 'IN PROGRESS', bg: ns.yellow   };
    return                                              { label: 'NOT STARTED', bg: ns.ocean120 };
  })();

  const daysRemaining = 13;
  const getDueDateColor = (d) => d < 0 ? ns.rose : d === 0 ? ns.yellow : ns.ocean150;

  const card = { background: ns.white, borderRadius: '8px', padding: '1.5rem', boxShadow: '0 1px 3px rgba(19,33,44,0.1)', border: '1px solid ' + ns.ocean30 };

  return (
    <div style={{ fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif', background: ns.neutral, color: ns.ocean180, padding: '2rem', minHeight: '100vh' }}>
      <div style={{ maxWidth: '1400px', margin: '0 auto' }}>

        {/* Header */}
        <div style={{ ...card, marginBottom: '1.5rem' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: '1rem' }}>
            <div>
              <h1 style={{ fontSize: '1.875rem', fontWeight: 600, color: ns.ocean180, margin: '0 0 0.5rem' }}>Financial Close Tracking</h1>
              <select value={selectedPeriod} onChange={e => setSelectedPeriod(e.target.value)}
                style={{ padding: '0.5rem 1rem', border: '1px solid ' + ns.ocean30, borderRadius: '6px', fontSize: '1rem', fontFamily: 'inherit', background: ns.white, color: ns.ocean180, cursor: 'pointer' }}>
                <option>December 2025 Close</option>
                <option>November 2025 Close</option>
                <option>October 2025 Close</option>
              </select>
              <div style={{ marginTop: '0.5rem', fontSize: '0.875rem', color: ns.ocean150 }}>
                Demo Environment · {transactionData.totalTransactions} transactions · Last refresh: Dec 18, 2025 4:45 PM
              </div>
            </div>
            <div style={{ display: 'flex', gap: '1rem', alignItems: 'center' }}>
              <span style={{ padding: '0.5rem 1.5rem', borderRadius: '12px', fontSize: '1rem', fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.025em', background: closeStatus.bg, color: ns.white }}>
                {closeStatus.label}
              </span>
              <div style={{ background: daysRemaining < 3 ? ns.rose : daysRemaining <= 5 ? ns.yellow : ns.pine, color: ns.white, borderRadius: '8px', padding: '1rem', textAlign: 'center', minWidth: '110px' }}>
                <div style={{ fontSize: '0.875rem', fontWeight: 500, marginBottom: '0.25rem' }}>Days Remaining</div>
                <div style={{ fontSize: '1.5rem', fontWeight: 600 }}>{daysRemaining}</div>
              </div>
              <div style={{ width: 80, height: 80, borderRadius: '50%', background: 'conic-gradient(' + ns.ocean120 + ' ' + stats.completionPct + '%, ' + ns.ocean10 + ' 0)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                <div style={{ width: 64, height: 64, borderRadius: '50%', background: ns.white, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '1.1rem', fontWeight: 600, color: ns.ocean180 }}>
                  {stats.completionPct}%
                </div>
              </div>
            </div>
          </div>
        </div>

        {/* Alert Badges */}
        {(stats.overdue > 0 || stats.dueToday > 0 || stats.blocked > 0) && (
          <div style={{ ...card, marginBottom: '1.5rem', display: 'flex', gap: '1rem', flexWrap: 'wrap', alignItems: 'center' }}>
            {stats.overdue > 0 && (
              <div style={{ background: ns.rose, color: ns.white, padding: '0.5rem 1rem', borderRadius: '6px', display: 'flex', alignItems: 'center', gap: '0.5rem', fontSize: '0.875rem', fontWeight: 500 }}>
                <AlertCircle size={16} /> {stats.overdue} Overdue Tasks
              </div>
            )}
            {stats.dueToday > 0 && (
              <div style={{ background: ns.yellow, color: ns.ocean180, padding: '0.5rem 1rem', borderRadius: '6px', display: 'flex', alignItems: 'center', gap: '0.5rem', fontSize: '0.875rem', fontWeight: 500 }}>
                <Clock size={16} /> {stats.dueToday} Tasks Due Today
              </div>
            )}
            {stats.blocked > 0 && (
              <div style={{ background: ns.rose, color: ns.white, padding: '0.5rem 1rem', borderRadius: '6px', display: 'flex', alignItems: 'center', gap: '0.5rem', fontSize: '0.875rem', fontWeight: 500 }}>
                <AlertTriangle size={16} /> {stats.blocked} Blocked Tasks
              </div>
            )}
            <div style={{ background: ns.pine, color: ns.white, padding: '0.5rem 1rem', borderRadius: '6px', display: 'flex', alignItems: 'center', gap: '0.5rem', fontSize: '0.875rem', fontWeight: 500 }}>
              <FileText size={16} /> {transactionData.invoices} Invoices to Review
            </div>
            <div style={{ background: ns.ocean60, color: ns.white, padding: '0.5rem 1rem', borderRadius: '6px', display: 'flex', alignItems: 'center', gap: '0.5rem', fontSize: '0.875rem', fontWeight: 500 }}>
              <FileText size={16} /> {transactionData.journals} Journal Entries
            </div>
          </div>
        )}

        {/* Summary Stats */}
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit,minmax(180px,1fr))', gap: '1rem', marginBottom: '1.5rem' }}>
          {[
            { label: 'Total Tasks',  value: stats.total,      bg: ns.ocean120 },
            { label: 'Completed',    value: stats.completed,   bg: ns.pine     },
            { label: 'In Progress',  value: stats.inProgress,  bg: ns.yellow, color: ns.ocean180 },
            { label: 'Blocked',      value: stats.blocked,     bg: ns.rose     },
            { label: 'Due Today',    value: stats.dueToday,    bg: ns.ocean60  },
          ].map((m, i) => (
            <div key={i} style={{ background: m.bg, color: m.color || ns.white, borderRadius: '8px', padding: '1.5rem', textAlign: 'center', boxShadow: '0 1px 3px rgba(19,33,44,0.1)' }}>
              <div style={{ fontSize: '0.875rem', fontWeight: 500, marginBottom: '0.5rem' }}>{m.label}</div>
              <div style={{ fontSize: '2rem', fontWeight: 600 }}>{m.value}</div>
            </div>
          ))}
        </div>

        {/* View Selector */}
        <div className="no-print" style={{ ...card, marginBottom: '1.5rem', display: 'flex', gap: '0.5rem', flexWrap: 'wrap' }}>
          {[{ id: 'workflow', label: 'Workflow View' }, { id: 'owner', label: 'By Owner' }, { id: 'invoices', label: 'Invoice Review' }].map(v => (
            <button key={v.id} onClick={() => setSelectedView(v.id)} style={{
              padding: '0.75rem 1.5rem', borderRadius: '6px', fontSize: '0.875rem', fontWeight: 500,
              cursor: 'pointer', fontFamily: 'inherit',
              background: selectedView === v.id ? ns.ocean120 : ns.white,
              color: selectedView === v.id ? ns.white : ns.ocean150,
              border: '1px solid ' + (selectedView === v.id ? ns.ocean120 : ns.ocean30)
            }}>{v.label}</button>
          ))}
        </div>

        {/* ── WORKFLOW VIEW ── */}
        {selectedView === 'workflow' && (
          <div>
            {stages.map(stage => {
              const stageTasks  = tasks.filter(t => t.stage === stage.id);
              const isExpanded  = expandedStages['stage' + stage.id];
              const completed   = stageTasks.filter(t => t.status === 'complete').length;
              const total       = stageTasks.length;
              const pct         = Math.round((completed / total) * 100);

              return (
                <div key={stage.id} style={{ ...card, padding: 0, marginBottom: '1rem' }}>
                  <div onClick={() => toggleStage(stage.id)} style={{ padding: '1.5rem', cursor: 'pointer', display: 'flex', justifyContent: 'space-between', alignItems: 'center', borderBottom: isExpanded ? '1px solid ' + ns.ocean30 : 'none' }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: '1rem', flex: 1 }}>
                      {isExpanded ? <ChevronDown size={20} color={ns.ocean120} /> : <ChevronRight size={20} color={ns.ocean120} />}
                      <div>
                        <h3 style={{ fontSize: '1.125rem', fontWeight: 600, color: ns.ocean180, margin: 0 }}>Stage {stage.id}: {stage.name}</h3>
                        <div style={{ fontSize: '0.875rem', color: ns.ocean150, marginTop: '0.25rem' }}>{stage.days}</div>
                      </div>
                    </div>
                    <div style={{ display: 'flex', alignItems: 'center', gap: '1rem' }}>
                      <div style={{ fontSize: '0.875rem', color: ns.ocean150 }}>{completed} of {total} complete</div>
                      <div style={{ width: 100, height: 8, background: ns.ocean10, borderRadius: 4, overflow: 'hidden' }}>
                        <div style={{ width: pct + '%', height: '100%', background: pct === 100 ? ns.pine : ns.ocean120, transition: 'width 0.3s' }} />
                      </div>
                    </div>
                  </div>

                  {isExpanded && (
                    <div style={{ padding: '1.5rem', overflowX: 'auto' }}>
                      <table style={{ width: '100%', borderCollapse: 'collapse', minWidth: 900 }}>
                        <thead>
                          <tr style={{ background: ns.ocean10 }}>
                            {['', 'Task', 'Owner', 'Due Date', 'Status', 'Priority'].map((h, i) => (
                              <th key={i} style={{ padding: '0.875rem', textAlign: 'left', fontWeight: 600, color: ns.ocean150, borderBottom: '1px solid ' + ns.ocean30, fontSize: '0.875rem', width: i === 0 ? 40 : 'auto' }}>{h}</th>
                            ))}
                          </tr>
                        </thead>
                        <tbody>
                          {stageTasks.map((task, idx) => (
                            <tr key={task.id} style={{ background: idx % 2 === 0 ? ns.white : ns.ocean10, borderBottom: '1px solid ' + ns.ocean30 }}>
                              <td style={{ padding: '0.875rem' }}>
                                <div onClick={() => toggleTaskStatus(task.id)} style={{ cursor: 'pointer' }} title="Click to update status">
                                  {task.status === 'complete'
                                    ? <CheckSquare size={20} color={ns.pine} />
                                    : <Square size={20} color={ns.ocean120} />}
                                </div>
                              </td>
                              <td style={{ padding: '0.875rem', color: ns.ocean150, fontSize: '0.875rem' }}>
                                <div style={{ fontWeight: 500, color: ns.ocean180 }}>{task.name}</div>
                                <div style={{ fontSize: '0.75rem', color: ns.ocean150, marginTop: '0.2rem' }}>{task.description}</div>
                              </td>
                              <td style={{ padding: '0.875rem', fontSize: '0.875rem' }}>
                                <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem', color: ns.ocean150 }}>
                                  <User size={15} /> {task.owner}
                                </div>
                              </td>
                              <td style={{ padding: '0.875rem', fontSize: '0.875rem', color: getDueDateColor(task.daysUntil), fontWeight: task.daysUntil <= 0 ? 600 : 400 }}>
                                {task.dueDate}
                                {task.daysUntil < 0 && task.status !== 'complete' && (
                                  <span style={{ marginLeft: '0.4rem', color: ns.rose, fontWeight: 600 }}>({Math.abs(task.daysUntil)}d overdue)</span>
                                )}
                                {task.daysUntil === 0 && ' (Today)'}
                              </td>
                              <td style={{ padding: '0.875rem' }}><StatusBadge status={task.status} /></td>
                              <td style={{ padding: '0.875rem' }}><PriorityBadge priority={task.priority} /></td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}

        {/* ── BY OWNER VIEW ── */}
        {selectedView === 'owner' && (
          <div style={{ display: 'grid', gap: '1.5rem', gridTemplateColumns: 'repeat(auto-fit,minmax(380px,1fr))' }}>
            {employees.slice(0, 6).map(emp => {
              const ownerTasks  = tasks.filter(t => t.owner === emp.name);
              const completed   = ownerTasks.filter(t => t.status === 'complete').length;
              const total       = ownerTasks.length;
              const pct         = total > 0 ? Math.round((completed / total) * 100) : 0;
              if (total === 0) return null;
              return (
                <div key={emp.id} style={card}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1rem' }}>
                    <div style={{ fontSize: '1.125rem', fontWeight: 600, color: ns.ocean120, display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                      <User size={18} /> {emp.name}
                    </div>
                    <div style={{ fontSize: '1.25rem', fontWeight: 600, color: pct === 100 ? ns.pine : ns.ocean120 }}>{pct}%</div>
                  </div>
                  <div style={{ marginBottom: '1rem' }}>
                    <div style={{ fontSize: '0.875rem', color: ns.ocean150, marginBottom: '0.5rem' }}>{completed} of {total} tasks complete</div>
                    <div style={{ width: '100%', height: 8, background: ns.ocean10, borderRadius: 4, overflow: 'hidden' }}>
                      <div style={{ width: pct + '%', height: '100%', background: pct === 100 ? ns.pine : ns.ocean120 }} />
                    </div>
                  </div>
                  <table style={{ width: '100%', borderCollapse: 'collapse' }}>
                    <tbody>
                      {ownerTasks.map((task, i) => (
                        <tr key={task.id} style={{ background: i%2===0 ? ns.white : ns.ocean10, borderBottom: '1px solid ' + ns.ocean30 }}>
                          <td style={{ padding: '0.75rem', fontSize: '0.875rem', color: ns.ocean150 }}>{task.name}</td>
                          <td style={{ padding: '0.75rem', textAlign: 'right' }}><StatusBadge status={task.status} small /></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              );
            })}
          </div>
        )}

        {/* ── INVOICE REVIEW VIEW ── */}
        {selectedView === 'invoices' && (
          <div style={card}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1.5rem' }}>
              <h3 style={{ fontSize: '1.125rem', fontWeight: 600, color: ns.ocean180, margin: 0 }}>
                December 2025 Invoices for Review ({invoiceData.length} of {transactionData.invoices} total)
              </h3>
              <span style={{ background: ns.ocean120, color: ns.white, padding: '0.5rem 1rem', borderRadius: '6px', fontSize: '0.875rem', fontWeight: 500 }}>
                Demo Environment
              </span>
            </div>
            <div style={{ overflowX: 'auto' }}>
              <table style={{ width: '100%', borderCollapse: 'collapse', minWidth: 700 }}>
                <thead>
                  <tr style={{ background: ns.ocean10 }}>
                    {['Invoice #', 'Date', 'Customer', 'Amount', 'Status'].map(h => (
                      <th key={h} style={{ padding: '1rem', textAlign: h === 'Amount' ? 'right' : 'left', fontWeight: 600, color: ns.ocean150, borderBottom: '1px solid ' + ns.ocean30, fontSize: '0.875rem' }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {invoiceData.map((inv, i) => (
                    <tr key={inv.id} style={{ background: i%2===0 ? ns.white : ns.ocean10, borderBottom: '1px solid ' + ns.ocean30 }}>
                      <td style={{ padding: '1rem', fontSize: '0.875rem', color: ns.ocean120, fontWeight: 600 }}>{inv.tranid}</td>
                      <td style={{ padding: '1rem', color: ns.ocean150, fontSize: '0.875rem' }}>{inv.date}</td>
                      <td style={{ padding: '1rem', fontSize: '0.875rem', color: ns.ocean150 }}>{inv.customer}</td>
                      <td style={{ padding: '1rem', textAlign: 'right', color: ns.ocean180, fontSize: '0.875rem', fontWeight: 600 }}>{fmtCurrency(inv.amount)}</td>
                      <td style={{ padding: '1rem' }}>
                        <span style={{ padding: '0.25rem 0.75rem', borderRadius: '12px', fontSize: '0.75rem', fontWeight: 500, textTransform: 'uppercase', display: 'inline-block', whiteSpace: 'nowrap', background: inv.status === 'Billed' ? ns.pine : ns.yellow, color: inv.status === 'Billed' ? ns.white : ns.ocean180 }}>
                          {inv.status}
                        </span>
                      </td>
                    </tr>
                  ))}
                </tbody>
                <tfoot>
                  <tr style={{ background: ns.ocean10, fontWeight: 600 }}>
                    <td colSpan={3} style={{ padding: '1rem', fontSize: '0.875rem', color: ns.ocean180 }}>Total ({invoiceData.length} invoices shown)</td>
                    <td style={{ padding: '1rem', textAlign: 'right', fontSize: '0.875rem', color: ns.ocean180, fontWeight: 600 }}>{fmtCurrency(invoiceData.reduce((s, inv) => s + inv.amount, 0))}</td>
                    <td />
                  </tr>
                </tfoot>
              </table>
            </div>
          </div>
        )}

      </div>
    </div>
  );
};

ReactDOM.render(<FinancialCloseDashboard />, document.getElementById('root'));
</script>
</body>
</html>
