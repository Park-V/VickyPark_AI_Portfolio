        return { total, completed, inProgress, blocked, dueToday, overdue, completionPct };
      }, [tasks]);

      const getCloseStatus = () => {
        const { completionPct, blocked, overdue } = stats;
        if (blocked > 0 || overdue > 0) return { label: 'AT RISK', bg: ns.rose };
        if (completionPct === 100) return { label: 'COMPLETE', bg: ns.pine };
        if (completionPct >= 50)   return { label: 'IN PROGRESS', bg: ns.yellow };
        return { label: 'NOT STARTED', bg: ns.ocean120 };
      };

      const closeStatus  = getCloseStatus();
      const daysRemaining = 13;

      return (
        <div style={{ fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif',
          background: ns.neutral, color: ns.ocean180, padding: '2rem', minHeight: '100vh' }}>

          {/* ── Header ─────────────────────────────────────────────────────────── */}
          <div style={{ background: ns.white, borderRadius: '8px', padding: '1.5rem',
            boxShadow: '0 1px 3px rgba(19,33,44,0.1)', border: `1px solid ${ns.ocean30}`, marginBottom: '1.5rem' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: '1rem' }}>
              <div>
                <h1 style={{ fontSize: '1.875rem', fontWeight: 600, color: ns.ocean180, margin: '0 0 0.5rem 0' }}>
                  Financial Close &amp; Consolidations
                </h1>
                <select value={selectedPeriod} onChange={e => setSelectedPeriod(e.target.value)}
                  style={{ padding: '0.5rem 1rem', border: `1px solid ${ns.ocean30}`, borderRadius: '6px',
                    fontSize: '1rem', fontFamily: 'inherit', background: ns.white, color: ns.ocean180, cursor: 'pointer' }}>
                  <option>December 2025 Close</option>
                  <option>November 2025 Close</option>
                  <option>October 2025 Close</option>
                </select>
                <div style={{ marginTop: '0.5rem', fontSize: '0.875rem', color: ns.ocean150 }}>
                  Live NetSuite data | {realTransactionData.totalTransactions} transactions | Last refresh: Dec 18, 2025 4:45 PM
                </div>
              </div>

              <div style={{ display: 'flex', gap: '1rem', alignItems: 'center' }}>
                <div style={{ textAlign: 'center' }}>
                  <span style={{ padding: '0.5rem 1.5rem', borderRadius: '12px', fontSize: '1rem',
                    fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.025em',
                    display: 'inline-block', whiteSpace: 'nowrap',
                    background: closeStatus.bg, color: ns.white }}>
                    {closeStatus.label}
                  </span>
                </div>

                <div style={{ background: daysRemaining < 3 ? ns.rose : daysRemaining <= 5 ? ns.yellow : ns.pine,
                  color: ns.white, borderRadius: '8px', padding: '1rem', textAlign: 'center', minWidth: '120px' }}>
                  <div style={{ fontSize: '0.875rem', fontWeight: 500, marginBottom: '0.25rem' }}>Days Remaining</div>
                  <div style={{ fontSize: '1.5rem', fontWeight: 600 }}>{daysRemaining}</div>
                </div>

                <div style={{ width: '80px', height: '80px', borderRadius: '50%',
                  background: `conic-gradient(${ns.ocean120} ${stats.completionPct}%, ${ns.ocean10} 0)`,
                  display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                  <div style={{ width: '64px', height: '64px', borderRadius: '50%', background: ns.white,
                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                    fontSize: '1.25rem', fontWeight: 600, color: ns.ocean180 }}>
                    {stats.completionPct}%
                  </div>
                </div>
              </div>
            </div>
          </div>

          {/* ── Alert Badges ───────────────────────────────────────────────────── */}
          {(stats.overdue > 0 || stats.dueToday > 0 || stats.blocked > 0 || realTransactionData.invoices > 0) && (
            <div style={{ background: ns.white, borderRadius: '8px', padding: '1rem',
              boxShadow: '0 1px 3px rgba(19,33,44,0.1)', border: `1px solid ${ns.ocean30}`,
              marginBottom: '1.5rem', display: 'flex', gap: '1rem', flexWrap: 'wrap', alignItems: 'center' }}>
              {stats.overdue > 0 && (
                <div style={{ background: ns.rose, color: ns.white, padding: '0.5rem 1rem', borderRadius: '6px',
                  display: 'flex', alignItems: 'center', gap: '0.5rem', fontSize: '0.875rem', fontWeight: 500 }}>
                  <AlertCircle size={16} />
                  {stats.overdue} Overdue Tasks
                </div>
              )}
              {stats.dueToday > 0 && (
                <div style={{ background: ns.yellow, color: ns.ocean180, padding: '0.5rem 1rem', borderRadius: '6px',
                  display: 'flex', alignItems: 'center', gap: '0.5rem', fontSize: '0.875rem', fontWeight: 500 }}>
                  <Clock size={16} />
                  {stats.dueToday} Tasks Due Today
                </div>
              )}
              {stats.blocked > 0 && (
                <div style={{ background: ns.rose, color: ns.white, padding: '0.5rem 1rem', borderRadius: '6px',
                  display: 'flex', alignItems: 'center', gap: '0.5rem', fontSize: '0.875rem', fontWeight: 500 }}>
                  <AlertTriangle size={16} />
                  {stats.blocked} Blocked Tasks
                </div>
              )}
              <a href="https://td3043154.app.netsuite.com/app/accounting/transactions/custinvc.nl"
                target="_blank" rel="noopener noreferrer"
                style={{ background: ns.pine, color: ns.white, padding: '0.5rem 1rem', borderRadius: '6px',
                  display: 'flex', alignItems: 'center', gap: '0.5rem', fontSize: '0.875rem', fontWeight: 500, textDecoration: 'none' }}>
                <FileText size={16} />
                {realTransactionData.invoices} Invoices to Review
                <ExternalLink size={14} />
              </a>
              <a href="https://td3043154.app.netsuite.com/app/accounting/transactions/journal.nl"
                target="_blank" rel="noopener noreferrer"
                style={{ background: ns.ocean60, color: ns.white, padding: '0.5rem 1rem', borderRadius: '6px',
                  display: 'flex', alignItems: 'center', gap: '0.5rem', fontSize: '0.875rem', fontWeight: 500, textDecoration: 'none' }}>
                <FileText size={16} />
                {realTransactionData.journals} Journal Entries
                <ExternalLink size={14} />
              </a>
            </div>
          )}

          {/* ── Summary Stats ─────────────────────────────────────────────────── */}
          <div style={{ display: 'grid', gap: '1.5rem',
            gridTemplateColumns: 'repeat(auto-fit, minmax(200px,1fr))', marginBottom: '1.5rem' }}>
            {[
              { label: 'Total Tasks',  value: stats.total,      bg: ns.ocean120, color: ns.white },
              { label: 'Completed',    value: stats.completed,  bg: ns.pine,     color: ns.white },
              { label: 'In Progress',  value: stats.inProgress, bg: ns.yellow,   color: ns.ocean180 },
              { label: 'Blocked',      value: stats.blocked,    bg: ns.rose,     color: ns.white },
              { label: 'Due Today',    value: stats.dueToday,   bg: ns.ocean60,  color: ns.white }
            ].map((k, i) => (
              <div key={i} style={{ background: k.bg, color: k.color, borderRadius: '8px',
                padding: '1.5rem', textAlign: 'center', boxShadow: '0 1px 3px rgba(19,33,44,0.1)' }}>
                <div style={{ fontSize: '0.875rem', fontWeight: 500, marginBottom: '0.5rem' }}>{k.label}</div>
                <div style={{ fontSize: '2rem', fontWeight: 600 }}>{k.value}</div>
              </div>
            ))}
          </div>

          {/* ── View Selector ─────────────────────────────────────────────────── */}
          <div className="no-print" style={{ background: ns.white, borderRadius: '8px', padding: '1rem',
            boxShadow: '0 1px 3px rgba(19,33,44,0.1)', border: `1px solid ${ns.ocean30}`,
            marginBottom: '1.5rem', display: 'flex', gap: '0.5rem', flexWrap: 'wrap' }}>
            {[
              { id: 'workflow', label: 'Workflow View' },
              { id: 'owner',    label: 'By Owner'      },
              { id: 'invoices', label: 'Invoice Review' }
            ].map(v => (
              <button key={v.id} onClick={() => setSelectedView(v.id)}
                style={{ padding: '0.75rem 1.5rem', borderRadius: '6px', fontSize: '0.875rem', fontWeight: 500,
                  cursor: 'pointer', fontFamily: 'inherit',
                  background: selectedView === v.id ? ns.ocean120 : ns.white,
                  color:      selectedView === v.id ? ns.white     : ns.ocean150,
                  border: `1px solid ${selectedView === v.id ? ns.ocean120 : ns.ocean30}` }}>
                {v.label}
              </button>
            ))}
          </div>

          {/* ── Workflow View ────────────────────────────────────────────────── */}
          {selectedView === 'workflow' && (
            <div>
              {stages.map(stage => {
                const stageTasks   = tasks.filter(t => t.stage === stage.id);
                const isExpanded   = expandedStages[`stage${stage.id}`];
                const stageCompleted = stageTasks.filter(t => t.status === 'complete').length;
                const stageTotal   = stageTasks.length;
                const stageProgress = Math.round((stageCompleted / stageTotal) * 100);

                return (
                  <div key={stage.id} style={{ background: ns.white, borderRadius: '8px',
                    boxShadow: '0 1px 3px rgba(19,33,44,0.1)', border: `1px solid ${ns.ocean30}`, marginBottom: '1rem' }}>
                    <div onClick={() => toggleStage(stage.id)}
                      style={{ padding: '1.5rem', cursor: 'pointer', display: 'flex',
                        justifyContent: 'space-between', alignItems: 'center',
                        borderBottom: isExpanded ? `1px solid ${ns.ocean30}` : 'none' }}>
                      <div style={{ display: 'flex', alignItems: 'center', gap: '1rem', flex: 1 }}>
                        {isExpanded
                          ? <ChevronDown size={20} color={ns.ocean120} />
                          : <ChevronRight size={20} color={ns.ocean120} />}
                        <div>
                          <h3 style={{ fontSize: '1.125rem', fontWeight: 600, color: ns.ocean180, margin: 0 }}>
                            Stage {stage.id}: {stage.name}
                          </h3>
                          <div style={{ fontSize: '0.875rem', color: ns.ocean150, marginTop: '0.25rem' }}>
                            {stage.days}
                          </div>
                        </div>
                      </div>
                      <div style={{ display: 'flex', alignItems: 'center', gap: '1rem' }}>
                        <div style={{ fontSize: '0.875rem', color: ns.ocean150 }}>
                          {stageCompleted} of {stageTotal} complete
                        </div>
                        <div style={{ width: '100px', height: '8px', background: ns.ocean10, borderRadius: '4px', overflow: 'hidden' }}>
                          <div style={{ width: `${stageProgress}%`, height: '100%',
                            background: stageProgress === 100 ? ns.pine : ns.ocean120,
                            transition: 'width 0.3s' }} />
                        </div>
                      </div>
                    </div>

                    {isExpanded && (
                      <div style={{ padding: '1.5rem', overflowX: 'auto' }}>
                        <table style={{ width: '100%', borderCollapse: 'collapse', minWidth: '1000px' }}>
                          <thead>
                            <tr style={{ background: ns.ocean10 }}>
                              {['', 'Task', 'Owner', 'Due Date', 'Status', 'Priority', 'Link'].map((h, i) => (
                                <th key={i} style={{ padding: '1rem', textAlign: i === 6 ? 'center' : 'left',
                                  fontWeight: 600, color: ns.ocean150, borderBottom: `1px solid ${ns.ocean30}`,
                                  fontSize: '0.875rem', width: i === 0 ? '40px' : 'auto' }}>
                                  {h}
                                </th>
                              ))}
                            </tr>
                          </thead>
                          <tbody>
                            {stageTasks.map((task, index) => (
                              <tr key={task.id} style={{ background: index % 2 === 0 ? ns.white : ns.ocean10,
                                borderBottom: `1px solid ${ns.ocean30}` }}>
                                <td style={{ padding: '1rem' }}>
                                  <div onClick={() => toggleTaskStatus(task.id)} style={{ cursor: 'pointer' }} title="Click to update status">
                                    {task.status === 'complete'
                                      ? <CheckSquare size={20} color={ns.pine} />
                                      : <Square size={20} color={ns.ocean120} />}
                                  </div>
                                </td>
                                <td style={{ padding: '1rem', color: ns.ocean150, fontSize: '0.875rem' }}>
                                  <div style={{ fontWeight: 500 }}>{task.name}</div>
                                  <div style={{ fontSize: '0.75rem', color: ns.ocean150, marginTop: '0.25rem' }}>{task.description}</div>
                                </td>
                                <td style={{ padding: '1rem', fontSize: '0.875rem' }}>
                                  {task.ownerId ? (
                                    <a href={`https://td3043154.app.netsuite.com/app/common/entity/employee.nl?id=${task.ownerId}`}
                                      target="_blank" rel="noopener noreferrer"
                                      style={{ display: 'flex', alignItems: 'center', gap: '0.5rem', color: ns.ocean120, textDecoration: 'none' }}>
                                      <User size={16} /> {task.owner}
                                    </a>
                                  ) : (
                                    <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem', color: ns.ocean150 }}>
                                      <User size={16} /> {task.owner}
                                    </div>
                                  )}
                                </td>
                                <td style={{ padding: '1rem', fontSize: '0.875rem',
                                  color: getDueDateColor(task.daysUntil),
                                  fontWeight: task.daysUntil <= 0 ? 600 : 400 }}>
                                  {task.dueDate}
                                  {task.daysUntil < 0 && task.status !== 'complete' && (
                                    <span style={{ marginLeft: '0.5rem', color: ns.rose, fontWeight: 600 }}>
                                      ({Math.abs(task.daysUntil)}d overdue)
                                    </span>
                                  )}
                                  {task.daysUntil === 0 && ' (Today)'}
                                </td>
                                <td style={{ padding: '1rem' }}>{getStatusBadge(task.status)}</td>
                                <td style={{ padding: '1rem' }}>{getPriorityBadge(task.priority)}</td>
                                <td style={{ padding: '1rem', textAlign: 'center' }}>
                                  {task.nsLink ? (
                                    <a href={task.nsLink} target="_blank" rel="noopener noreferrer"
                                      style={{ color: ns.ocean120 }} title="Open in NetSuite">
                                      <ExternalLink size={16} />
                                    </a>
                                  ) : (
                                    <span style={{ color: ns.ocean30 }}>—</span>
                                  )}
                                </td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}

          {/* ── By Owner View ────────────────────────────────────────────────── */}
          {selectedView === 'owner' && (
            <div style={{ display: 'grid', gap: '1.5rem', gridTemplateColumns: 'repeat(auto-fit, minmax(400px,1fr))' }}>
              {realEmployees.slice(0, 4).map(emp => {
                const ownerTasks    = tasks.filter(t => t.owner === emp.name);
                const completed     = ownerTasks.filter(t => t.status === 'complete').length;
                const total         = ownerTasks.length;
                const completionPct = total > 0 ? Math.round((completed / total) * 100) : 0;
                if (total === 0) return null;
                return (
                  <div key={emp.id} style={{ background: ns.white, borderRadius: '8px', padding: '1.5rem',
                    boxShadow: '0 1px 3px rgba(19,33,44,0.1)', border: `1px solid ${ns.ocean30}` }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1rem' }}>
                      <a href={`https://td3043154.app.netsuite.com/app/common/entity/employee.nl?id=${emp.id}`}
                        target="_blank" rel="noopener noreferrer"
                        style={{ fontSize: '1.125rem', fontWeight: 600, color: ns.ocean120, textDecoration: 'none',
                          display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                        {emp.name} <ExternalLink size={16} />
                      </a>
                      <div style={{ fontSize: '1.25rem', fontWeight: 600, color: completionPct === 100 ? ns.pine : ns.ocean120 }}>
                        {completionPct}%
                      </div>
                    </div>
                    <div style={{ marginBottom: '1rem' }}>
                      <div style={{ fontSize: '0.875rem', color: ns.ocean150, marginBottom: '0.5rem' }}>
                        {completed} of {total} tasks complete
                      </div>
                      <div style={{ width: '100%', height: '8px', background: ns.ocean10, borderRadius: '4px', overflow: 'hidden' }}>
                        <div style={{ width: `${completionPct}%`, height: '100%',
                          background: completionPct === 100 ? ns.pine : ns.ocean120 }} />
                      </div>
                    </div>
                    <table style={{ width: '100%', borderCollapse: 'collapse' }}>
                      <tbody>
                        {ownerTasks.map((task, index) => (
                          <tr key={task.id} style={{ background: index % 2 === 0 ? ns.white : ns.ocean10,
                            borderBottom: `1px solid ${ns.ocean30}` }}>
                            <td style={{ padding: '0.75rem', fontSize: '0.875rem', color: ns.ocean150 }}>{task.name}</td>
                            <td style={{ padding: '0.75rem', textAlign: 'right' }}>{getStatusBadge(task.status)}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                );
              })}
            </div>
          )}

          {/* ── Invoice Review View ──────────────────────────────────────────── */}
          {selectedView === 'invoices' && (
            <div style={{ background: ns.white, borderRadius: '8px', padding: '1.5rem',
              boxShadow: '0 1px 3px rgba(19,33,44,0.1)', border: `1px solid ${ns.ocean30}` }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1.5rem' }}>
                <h3 style={{ fontSize: '1.125rem', fontWeight: 600, color: ns.ocean180, margin: 0 }}>
                  December 2025 Invoices for Review ({realInvoices.length} of {realTransactionData.invoices} total)
                </h3>
                <a href="https://td3043154.app.netsuite.com/app/accounting/transactions/custinvc.nl"
                  target="_blank" rel="noopener noreferrer"
                  style={{ background: ns.ocean120, color: ns.white, padding: '0.5rem 1rem', borderRadius: '6px',
                    display: 'flex', alignItems: 'center', gap: '0.5rem',
                    fontSize: '0.875rem', fontWeight: 500, textDecoration: 'none' }}>
                  View All in NetSuite <ExternalLink size={14} />
                </a>
              </div>

              <div style={{ overflowX: 'auto' }}>
                <table style={{ width: '100%', borderCollapse: 'collapse', minWidth: '800px' }}>
                  <thead>
                    <tr style={{ background: ns.ocean10 }}>
                      {['Invoice #', 'Date', 'Customer', 'Amount', 'Status', 'Actions'].map((h, i) => (
                        <th key={i} style={{ padding: '1rem', textAlign: i === 3 ? 'right' : i === 5 ? 'center' : 'left',
                          fontWeight: 600, color: ns.ocean150, borderBottom: `1px solid ${ns.ocean30}`,
                          fontSize: '0.875rem' }}>
                          {h}
                        </th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {realInvoices.map((invoice, index) => (
                      <tr key={invoice.id} style={{ background: index % 2 === 0 ? ns.white : ns.ocean10,
                        borderBottom: `1px solid ${ns.ocean30}` }}>
                        <td style={{ padding: '1rem', fontSize: '0.875rem' }}>
                          <a href={`https://td3043154.app.netsuite.com/app/accounting/transactions/custinvc.nl?id=${invoice.id}`}
                            target="_blank" rel="noopener noreferrer"
                            style={{ color: ns.ocean120, textDecoration: 'underline', fontWeight: 500 }}>
                            {invoice.tranid}
                          </a>
                        </td>
                        <td style={{ padding: '1rem', color: ns.ocean150, fontSize: '0.875rem' }}>{invoice.date}</td>
                        <td style={{ padding: '1rem', fontSize: '0.875rem' }}>
                          <a href={`https://td3043154.app.netsuite.com/app/common/entity/custjob.nl?id=${invoice.customerId}`}
                            target="_blank" rel="noopener noreferrer"
                            style={{ color: ns.ocean120, textDecoration: 'none' }}>
                            {invoice.customer}
                          </a>
                        </td>
                        <td style={{ padding: '1rem', textAlign: 'right', color: ns.ocean150, fontSize: '0.875rem', fontWeight: 600 }}>
                          {formatCurrency(invoice.amount)}
                        </td>
                        <td style={{ padding: '1rem' }}>
                          <span style={{ padding: '0.25rem 0.75rem', borderRadius: '12px', fontSize: '0.75rem',
                            fontWeight: 500, textTransform: 'uppercase', letterSpacing: '0.025em',
                            display: 'inline-block', whiteSpace: 'nowrap',
                            background: invoice.status === 'Billed' ? ns.pine : ns.yellow,
                            color: invoice.status === 'Billed' ? ns.white : ns.ocean180 }}>
                            {invoice.status}
                          </span>
                        </td>
                        <td style={{ padding: '1rem', textAlign: 'center' }}>
                          <a href={`https://td3043154.app.netsuite.com/app/accounting/transactions/custinvc.nl?id=${invoice.id}`}
                            target="_blank" rel="noopener noreferrer"
                            style={{ color: ns.ocean120 }} title="Open in NetSuite">
                            <ExternalLink size={16} />
                          </a>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                  <tfoot>
                    <tr style={{ background: ns.ocean10, fontWeight: 600 }}>
                      <td colSpan={3} style={{ padding: '1rem', fontSize: '0.875rem', color: ns.ocean180 }}>
                        Total ({realInvoices.length} invoices shown)
                      </td>
                      <td style={{ padding: '1rem', textAlign: 'right', fontSize: '0.875rem', color: ns.ocean180, fontWeight: 600 }}>
                        {formatCurrency(realInvoices.reduce((sum, inv) => sum + inv.amount, 0))}
                      </td>
                      <td colSpan={2}></td>
                    </tr>
                  </tfoot>
                </table>
              </div>
            </div>
          )}

        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(
      React.createElement(FinancialCloseDashboard, null)
    );
  </script>
</body>
</html>
