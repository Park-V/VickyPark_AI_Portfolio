<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Real Estate Holdings Co. — Executive Financial Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prop-types@15.8.1/prop-types.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/recharts@2.12.0/umd/Recharts.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #F1EFED; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
    #root { min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const {
      BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer,
      PieChart, Pie, Cell, Legend, LineChart, Line, Area, AreaChart
    } = Recharts;

    const { useState, useEffect } = React;

    const ExecutiveDashboard = () => {
      // NetSuite Brand Colors
      const ns = {
        ocean120: '#36677D',
        ocean180: '#13212C',
        ocean150: '#264759',
        ocean60:  '#94BFCE',
        ocean30:  '#E7F2F5',
        ocean10:  '#F5FAFC',
        pine:     '#86B596',
        rose:     '#FF8675',
        yellow:   '#E2C06B',
        neutral:  '#F1EFED',
        white:    '#FFFFFF'
      };

      // Monthly Revenue Data
      const monthlyRevenue = [
        { month: 'Jan', revenue: 8.5,  target: 10.0 },
        { month: 'Feb', revenue: 12.2, target: 10.0 },
        { month: 'Mar', revenue: 15.8, target: 10.0 },
        { month: 'Apr', revenue: 9.8,  target: 10.0 },
        { month: 'May', revenue: 11.2, target: 10.0 },
        { month: 'Jun', revenue: 18.5, target: 10.0 },
        { month: 'Jul', revenue: 7.9,  target: 10.0 },
        { month: 'Aug', revenue: 10.1, target: 10.0 },
        { month: 'Sep', revenue: 19.8, target: 10.0 },
        { month: 'Oct', revenue: 8.4,  target: 10.0 },
        { month: 'Nov', revenue: 6.7,  target: 10.0 },
        { month: 'Dec', revenue: 11.1, target: 10.0 }
      ];

      // Customer Segmentation
      const customerSegments = [
        { name: 'Enterprise', customers: 3,  revenue: 31.6, color: ns.ocean120 },
        { name: 'Large',      customers: 14, revenue: 71.2, color: ns.pine     },
        { name: 'Medium',     customers: 9,  revenue: 15.4, color: ns.yellow   },
        { name: 'Small',      customers: 3,  revenue: 1.8,  color: ns.rose     }
      ];

      // Top Customer Performance
      const topCustomers = [
        { name: 'Customer 533', revenue: 15.0, growth:  12.5 },
        { name: 'Customer 545', revenue: 9.6,  growth:   8.2 },
        { name: 'Customer 519', revenue: 7.0,  growth:  -2.1 },
        { name: 'Customer 522', revenue: 6.7,  growth:  15.8 },
        { name: 'Customer 526', revenue: 5.8,  growth:   3.4 }
      ];

      // Quarterly Performance
      const quarterlyData = [
        { quarter: 'Q1 2024', revenue: 36.5, profit: 32.9, margin: 90.1 },
        { quarter: 'Q2 2024', revenue: 39.5, profit: 35.6, margin: 90.1 },
        { quarter: 'Q3 2024', revenue: 37.8, profit: 34.0, margin: 89.9 },
        { quarter: 'Q4 2024', revenue: 26.2, profit: 23.6, margin: 90.1 }
      ];

      // Market Trends (actual + projected)
      const marketTrends = [
        { period: '2023', actual: 98.5  },
        { period: '2024', actual: 120.0 },
        { period: '2025', projected: 144.0 },
        { period: '2026', projected: 172.8 },
        { period: '2027', projected: 207.4 }
      ];

      const formatCurrency = (v) => `$${v}M`;
      const formatPercent  = (v) => `${v}%`;

      // ── shared card style ──────────────────────────────────────────────────
      const card = (extra = {}) => ({
        background:   ns.white,
        borderRadius: '8px',
        padding:      '1.5rem',
        boxShadow:    '0 1px 3px rgba(19,33,44,0.1)',
        border:       `1px solid ${ns.ocean30}`,
        ...extra
      });

      const sectionTitle = {
        color:        ns.ocean180,
        fontSize:     '1.25rem',
        fontWeight:   600,
        marginBottom: '1.5rem'
      };

      // ── tooltip styles ─────────────────────────────────────────────────────
      const tooltipStyle = {
        background:   ns.white,
        border:       `1px solid ${ns.ocean30}`,
        borderRadius: '6px',
        color:        ns.ocean180,
        fontSize:     '0.875rem'
      };

      return (
        <div style={{
          fontFamily:  '-apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif',
          background:  ns.neutral,
          color:       ns.ocean180,
          padding:     '2rem',
          minHeight:   '100vh'
        }}>

          {/* ── Header ────────────────────────────────────────────────────── */}
          <div style={{ ...card(), textAlign: 'center', marginBottom: '2rem', padding: '2rem' }}>
            <h1 style={{ color: ns.ocean180, fontSize: '2.25rem', fontWeight: 700, margin: '0 0 0.5rem 0', letterSpacing: '-0.02em' }}>
              Real Estate Holdings Co.
            </h1>
            <h2 style={{ color: ns.ocean120, fontSize: '1.375rem', fontWeight: 500, margin: '0 0 0.375rem 0' }}>
              Executive Financial Dashboard
            </h2>
            <p style={{ color: ns.ocean150, fontSize: '1rem', margin: 0 }}>
              FY2024 Annual Performance Review &amp; Strategic Outlook
            </p>
          </div>

          {/* ── KPI Cards ─────────────────────────────────────────────────── */}
          <div style={{
            display: 'grid',
            gap: '1.5rem',
            gridTemplateColumns: 'repeat(auto-fit, minmax(230px, 1fr))',
            marginBottom: '2rem'
          }}>
            {/* Total Revenue */}
            <div style={{ background: ns.ocean120, color: ns.white, borderRadius: '8px', padding: '1.5rem', textAlign: 'center', boxShadow: '0 1px 3px rgba(19,33,44,0.12)' }}>
              <p style={{ fontSize: '0.8125rem', fontWeight: 500, margin: '0 0 0.5rem 0', textTransform: 'uppercase', letterSpacing: '0.06em', opacity: 0.85 }}>Total Revenue</p>
              <p style={{ fontSize: '2.25rem', fontWeight: 700, margin: '0 0 0.25rem 0', lineHeight: 1 }}>$120.0M</p>
              <p style={{ fontSize: '0.875rem', opacity: 0.9, margin: 0 }}>+22% YoY Growth</p>
            </div>

            {/* Gross Profit */}
            <div style={{ background: ns.pine, color: ns.white, borderRadius: '8px', padding: '1.5rem', textAlign: 'center', boxShadow: '0 1px 3px rgba(19,33,44,0.12)' }}>
              <p style={{ fontSize: '0.8125rem', fontWeight: 500, margin: '0 0 0.5rem 0', textTransform: 'uppercase', letterSpacing: '0.06em', opacity: 0.85 }}>Gross Profit</p>
              <p style={{ fontSize: '2.25rem', fontWeight: 700, margin: '0 0 0.25rem 0', lineHeight: 1 }}>$108.0M</p>
              <p style={{ fontSize: '0.875rem', opacity: 0.9, margin: 0 }}>90% Gross Margin</p>
            </div>

            {/* Active Customers */}
            <div style={{ background: ns.yellow, color: ns.ocean180, borderRadius: '8px', padding: '1.5rem', textAlign: 'center', boxShadow: '0 1px 3px rgba(19,33,44,0.12)' }}>
              <p style={{ fontSize: '0.8125rem', fontWeight: 500, margin: '0 0 0.5rem 0', textTransform: 'uppercase', letterSpacing: '0.06em', opacity: 0.75 }}>Active Customers</p>
              <p style={{ fontSize: '2.25rem', fontWeight: 700, margin: '0 0 0.25rem 0', lineHeight: 1 }}>29</p>
              <p style={{ fontSize: '0.875rem', opacity: 0.75, margin: 0 }}>$4.1M Avg Deal Size</p>
            </div>

            {/* Net Cash Flow */}
            <div style={{ ...card({ padding: '1.5rem', textAlign: 'center' }) }}>
              <p style={{ fontSize: '0.8125rem', fontWeight: 500, margin: '0 0 0.5rem 0', textTransform: 'uppercase', letterSpacing: '0.06em', color: ns.ocean150 }}>Net Cash Flow</p>
              <p style={{ fontSize: '2.25rem', fontWeight: 700, margin: '0 0 0.25rem 0', lineHeight: 1, color: ns.ocean180 }}>$85.2M</p>
              <p style={{ fontSize: '0.875rem', color: ns.ocean150, margin: 0 }}>Strong Liquidity Position</p>
            </div>
          </div>

          {/* ── Monthly Revenue Chart ──────────────────────────────────────── */}
          <div style={{ ...card(), marginBottom: '2rem' }}>
            <h3 style={sectionTitle}>Monthly Revenue Performance vs. Target</h3>
            <ResponsiveContainer width="100%" height={340}>
              <BarChart data={monthlyRevenue} margin={{ top: 4, right: 16, left: 0, bottom: 0 }}>
                <CartesianGrid strokeDasharray="3 3" stroke={ns.ocean30} />
                <XAxis dataKey="month" stroke={ns.ocean150} tick={{ fontSize: 12 }} />
                <YAxis tickFormatter={formatCurrency} stroke={ns.ocean150} tick={{ fontSize: 12 }} />
                <Tooltip
                  formatter={(value, name) => [formatCurrency(value), name === 'revenue' ? 'Actual Revenue' : 'Monthly Target']}
                  contentStyle={tooltipStyle}
                />
                <Legend formatter={(v) => v === 'revenue' ? 'Actual Revenue' : 'Monthly Target'} />
                <Bar dataKey="target"  fill={ns.ocean30}  name="target"  radius={[3,3,0,0]} />
                <Bar dataKey="revenue" fill={ns.ocean120} name="revenue" radius={[3,3,0,0]} />
              </BarChart>
            </ResponsiveContainer>
          </div>

          {/* ── Customer Analysis (2-col) ──────────────────────────────────── */}
          <div style={{
            display: 'grid',
            gap: '1.5rem',
            gridTemplateColumns: 'repeat(auto-fit, minmax(380px, 1fr))',
            marginBottom: '2rem'
          }}>
            {/* Pie Chart */}
            <div style={card()}>
              <h3 style={sectionTitle}>Customer Segmentation by Revenue</h3>
              <ResponsiveContainer width="100%" height={240}>
                <PieChart>
                  <Pie
                    data={customerSegments}
                    cx="50%" cy="50%"
                    outerRadius={90}
                    dataKey="revenue"
                    label={({ name, percent }) => `${name} ${(percent * 100).toFixed(0)}%`}
                    labelLine={false}
                  >
                    {customerSegments.map((entry, i) => (
                      <Cell key={i} fill={entry.color} />
                    ))}
                  </Pie>
                  <Tooltip formatter={(v) => formatCurrency(v)} contentStyle={tooltipStyle} />
                </PieChart>
              </ResponsiveContainer>
              <div style={{ marginTop: '1rem', borderTop: `1px solid ${ns.ocean30}`, paddingTop: '1rem' }}>
                {customerSegments.map((seg, i) => (
                  <div key={i} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '0.5rem', fontSize: '0.875rem' }}>
                    <span style={{ display: 'flex', alignItems: 'center', gap: '0.5rem', color: ns.ocean150 }}>
                      <span style={{ width: 10, height: 10, borderRadius: '50%', background: seg.color, display: 'inline-block' }} />
                      {seg.name}: {seg.customers} customers
                    </span>
                    <span style={{ fontWeight: 600, color: ns.ocean180 }}>{formatCurrency(seg.revenue)}</span>
                  </div>
                ))}
              </div>
            </div>

            {/* Top 5 Customers */}
            <div style={card()}>
              <h3 style={sectionTitle}>Top 5 Customer Performance</h3>
              <div>
                {topCustomers.map((c, i) => (
                  <div key={i} style={{
                    display: 'flex',
                    justifyContent: 'space-between',
                    alignItems: 'center',
                    padding: '0.875rem 0',
                    borderBottom: i < topCustomers.length - 1 ? `1px solid ${ns.ocean30}` : 'none'
                  }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: '0.75rem' }}>
                      <span style={{
                        width: 28, height: 28, borderRadius: '50%',
                        background: ns.ocean30, color: ns.ocean120,
                        display: 'flex', alignItems: 'center', justifyContent: 'center',
                        fontSize: '0.75rem', fontWeight: 700, flexShrink: 0
                      }}>{i + 1}</span>
                      <div>
                        <div style={{ fontWeight: 600, color: ns.ocean180, fontSize: '0.9375rem' }}>{c.name}</div>
                        <div style={{ fontSize: '0.8125rem', color: ns.ocean150 }}>{formatCurrency(c.revenue)} revenue</div>
                      </div>
                    </div>
                    <span style={{
                      padding: '0.25rem 0.75rem',
                      borderRadius: '12px',
                      fontSize: '0.75rem',
                      fontWeight: 600,
                      background: c.growth > 0 ? ns.pine : ns.rose,
                      color: ns.white
                    }}>
                      {c.growth > 0 ? '+' : ''}{c.growth}%
                    </span>
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* ── Quarterly Performance Bar Chart ───────────────────────────── */}
          <div style={{ ...card(), marginBottom: '2rem' }}>
            <h3 style={sectionTitle}>Quarterly Performance: Revenue vs. Profit (FY2024)</h3>
            <ResponsiveContainer width="100%" height={300}>
              <BarChart data={quarterlyData} margin={{ top: 4, right: 16, left: 0, bottom: 0 }}>
                <CartesianGrid strokeDasharray="3 3" stroke={ns.ocean30} />
                <XAxis dataKey="quarter" stroke={ns.ocean150} tick={{ fontSize: 12 }} />
                <YAxis tickFormatter={formatCurrency} stroke={ns.ocean150} tick={{ fontSize: 12 }} />
                <Tooltip
                  formatter={(value, name) => [formatCurrency(value), name === 'revenue' ? 'Revenue' : 'Gross Profit']}
                  contentStyle={tooltipStyle}
                />
                <Legend formatter={(v) => v === 'revenue' ? 'Revenue' : 'Gross Profit'} />
                <Bar dataKey="revenue" fill={ns.ocean120} name="revenue" radius={[3,3,0,0]} />
                <Bar dataKey="profit"  fill={ns.pine}     name="profit"  radius={[3,3,0,0]} />
              </BarChart>
            </ResponsiveContainer>
            <div style={{ display: 'flex', gap: '1.5rem', marginTop: '1rem', flexWrap: 'wrap' }}>
              {quarterlyData.map((q, i) => (
                <div key={i} style={{ padding: '0.625rem 1rem', background: ns.ocean10, borderRadius: '6px', fontSize: '0.8125rem', color: ns.ocean150, textAlign: 'center' }}>
                  <div style={{ fontWeight: 600, color: ns.ocean120 }}>{q.quarter}</div>
                  <div>Margin: <strong style={{ color: ns.pine }}>{q.margin}%</strong></div>
                </div>
              ))}
            </div>
          </div>

          {/* ── Market Growth Line Chart ───────────────────────────────────── */}
          <div style={{ ...card(), marginBottom: '2rem' }}>
            <h3 style={sectionTitle}>Market Growth Trajectory: Actual &amp; Projected Revenue (2023–2027)</h3>
            <ResponsiveContainer width="100%" height={280}>
              <AreaChart data={marketTrends} margin={{ top: 4, right: 16, left: 0, bottom: 0 }}>
                <defs>
                  <linearGradient id="actualGrad" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="5%"  stopColor={ns.ocean120} stopOpacity={0.18} />
                    <stop offset="95%" stopColor={ns.ocean120} stopOpacity={0.02} />
                  </linearGradient>
                  <linearGradient id="projectedGrad" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="5%"  stopColor={ns.pine} stopOpacity={0.18} />
                    <stop offset="95%" stopColor={ns.pine} stopOpacity={0.02} />
                  </linearGradient>
                </defs>
                <CartesianGrid strokeDasharray="3 3" stroke={ns.ocean30} />
                <XAxis dataKey="period" stroke={ns.ocean150} tick={{ fontSize: 12 }} />
                <YAxis tickFormatter={formatCurrency} stroke={ns.ocean150} tick={{ fontSize: 12 }} />
                <Tooltip
                  formatter={(value, name) => [formatCurrency(value), name === 'actual' ? 'Actual Revenue' : 'Projected Revenue']}
                  contentStyle={tooltipStyle}
                />
                <Legend formatter={(v) => v === 'actual' ? 'Actual Revenue' : 'Projected Revenue'} />
                <Area
                  type="monotone"
                  dataKey="actual"
                  stroke={ns.ocean120}
                  strokeWidth={2.5}
                  fill="url(#actualGrad)"
                  name="actual"
                  dot={{ r: 5, fill: ns.ocean120, strokeWidth: 0 }}
                  connectNulls={false}
                />
                <Area
                  type="monotone"
                  dataKey="projected"
                  stroke={ns.pine}
                  strokeWidth={2.5}
                  strokeDasharray="6 3"
                  fill="url(#projectedGrad)"
                  name="projected"
                  dot={{ r: 5, fill: ns.pine, strokeWidth: 0 }}
                  connectNulls={false}
                />
              </AreaChart>
            </ResponsiveContainer>
          </div>

          {/* ── 2025 Target KPIs Table ─────────────────────────────────────── */}
          <div style={{ ...card(), marginBottom: '2rem' }}>
            <h3 style={sectionTitle}>2025 Target KPIs</h3>
            <div style={{
              display: 'grid',
              gap: '0.75rem',
              gridTemplateColumns: 'repeat(auto-fit, minmax(240px, 1fr))'
            }}>
              {[
                { label: 'Revenue Target',      value: '$144M (+20%)',  accent: ns.ocean120 },
                { label: 'Gross Margin',         value: '≥ 88%',        accent: ns.pine     },
                { label: 'New Customers',        value: '12–15',        accent: ns.ocean120 },
                { label: 'Customer Retention',   value: '≥ 95%',        accent: ns.pine     },
                { label: 'Net Cash Flow Target', value: '$105M+',       accent: ns.ocean120 },
                { label: 'R&D Investment',       value: '$15M',         accent: ns.yellow   },
                { label: 'Sales Headcount',      value: '+30 Reps',     accent: ns.ocean150 },
                { label: 'Customer Concentration','value': '<35% Top-5', accent: ns.rose    }
              ].map((row, i) => (
                <div key={i} style={{
                  display: 'flex',
                  justifyContent: 'space-between',
                  alignItems: 'center',
                  padding: '0.75rem 1rem',
                  background: ns.ocean10,
                  borderRadius: '6px',
                  borderLeft: `3px solid ${row.accent}`
                }}>
                  <span style={{ color: ns.ocean150, fontSize: '0.875rem' }}>{row.label}</span>
                  <span style={{ fontWeight: 700, color: row.accent, fontSize: '0.9375rem' }}>{row.value}</span>
                </div>
              ))}
            </div>
          </div>

          {/* ── Strategic Priorities ──────────────────────────────────────── */}
          <div style={card()}>
            <h3 style={sectionTitle}>Strategic Priorities for 2025</h3>
            <div style={{
              display: 'grid',
              gap: '1rem',
              gridTemplateColumns: 'repeat(auto-fit, minmax(280px, 1fr))'
            }}>
              {/* Q1 Priorities */}
              <div style={{ padding: '1.25rem', background: ns.ocean10, borderRadius: '8px', borderTop: `3px solid ${ns.ocean120}` }}>
                <h4 style={{ color: ns.ocean120, margin: '0 0 0.75rem 0', fontWeight: 600, fontSize: '0.9375rem' }}>Q1 2025 Priorities</h4>
                <ul style={{ color: ns.ocean150, margin: 0, paddingLeft: '1.25rem', lineHeight: 1.7, fontSize: '0.875rem' }}>
                  <li>Launch customer diversification initiative</li>
                  <li>Expand European operations by 25%</li>
                  <li>Implement advanced analytics platform</li>
                </ul>
              </div>

              {/* Growth Investments */}
              <div style={{ padding: '1.25rem', background: ns.ocean10, borderRadius: '8px', borderTop: `3px solid ${ns.pine}` }}>
                <h4 style={{ color: ns.pine, margin: '0 0 0.75rem 0', fontWeight: 600, fontSize: '0.9375rem' }}>Growth Investments</h4>
                <ul style={{ color: ns.ocean150, margin: 0, paddingLeft: '1.25rem', lineHeight: 1.7, fontSize: '0.875rem' }}>
                  <li>$15M in R&amp;D for next-generation products</li>
                  <li>Sales team expansion (+30 reps)</li>
                  <li>Strategic acquisitions evaluation</li>
                </ul>
              </div>

              {/* Risk Mitigation */}
              <div style={{ padding: '1.25rem', background: ns.ocean10, borderRadius: '8px', borderTop: `3px solid ${ns.rose}` }}>
                <h4 style={{ color: ns.rose, margin: '0 0 0.75rem 0', fontWeight: 600, fontSize: '0.9375rem' }}>Risk Mitigation</h4>
                <ul style={{ color: ns.ocean150, margin: 0, paddingLeft: '1.25rem', lineHeight: 1.7, fontSize: '0.875rem' }}>
                  <li>Reduce top-5 customer dependency to under 35%</li>
                  <li>Establish $20M revolving credit facility</li>
                  <li>Enhance cybersecurity infrastructure</li>
                </ul>
              </div>

              {/* Operational Excellence */}
              <div style={{ padding: '1.25rem', background: ns.ocean10, borderRadius: '8px', borderTop: `3px solid ${ns.yellow}` }}>
                <h4 style={{ color: '#b89535', margin: '0 0 0.75rem 0', fontWeight: 600, fontSize: '0.9375rem' }}>Operational Excellence</h4>
                <ul style={{ color: ns.ocean150, margin: 0, paddingLeft: '1.25rem', lineHeight: 1.7, fontSize: '0.875rem' }}>
                  <li>Optimize cost structure for scale</li>
                  <li>Talent acquisition in key capability areas</li>
                  <li>Geographic market expansion roadmap</li>
                </ul>
              </div>
            </div>
          </div>

          {/* Footer */}
          <div style={{ textAlign: 'center', marginTop: '2rem', padding: '1rem 0', color: ns.ocean60, fontSize: '0.8125rem' }}>
            Real Estate Holdings Co. &mdash; Executive Financial Dashboard &mdash; FY2024 &mdash; Confidential
          </div>

        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(
      React.createElement(ExecutiveDashboard, null)
    );
  </script>
</body>
</html>
