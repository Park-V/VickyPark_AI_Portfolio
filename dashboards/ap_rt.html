  if (!v && v !== 0) return '$0';
  if (v >= 1000000) return '$' + (v/1000000).toFixed(1) + 'M';
  if (v >= 1000) return '$' + (v/1000).toFixed(0) + 'K';

const ComboChart = ({ data, height = 320 }) => {
  const ref = useRef(null);
  const chartRef = useRef(null);
  useEffect(() => {
    if (chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(ref.current.getContext('2d'), {
      data: {
        labels: data.map(d => d.month),
        datasets: [
          { type: 'bar',  label: 'Revenue',      data: data.map(d => d.revenue),     backgroundColor: ns.pine,     yAxisID: 'y'  },
          { type: 'bar',  label: 'Expenses',     data: data.map(d => d.expenses),    backgroundColor: ns.rose,     yAxisID: 'y'  },
          { type: 'line', label: 'Cash Balance', data: data.map(d => d.cashBalance), borderColor: ns.ocean120, backgroundColor: 'transparent', tension: 0.3, yAxisID: 'y2', pointRadius: 3 },
          { type: 'line', label: 'AP Balance',   data: data.map(d => d.apBalance),   borderColor: ns.yellow,   backgroundColor: 'transparent', tension: 0.3, yAxisID: 'y',  pointRadius: 2, borderDash: [4,2] },
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { position: 'bottom', labels: { font: { size: 10 }, boxWidth: 10 } } },
        scales: {
          y:  { position: 'left',  ticks: { callback: v => '$' + (v/1000000).toFixed(1) + 'M', font: { size: 10 } }, grid: { color: '#f0f0f0' } },
          y2: { position: 'right', ticks: { callback: v => '$' + (v/1000000).toFixed(0)  + 'M', font: { size: 10 } }, grid: { display: false } },
          x:  { ticks: { font: { size: 10 } }, grid: { display: false } },
        }
      }
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, []);
  return <div style={{ height }}><canvas ref={ref} /></div>;
};

const MetricCard = ({ title, value, subtitle, Icon: Ic, color, trend, onClick }) => (
  <div onClick={onClick} style={{ background: color || ns.ocean120, color: ns.white, borderRadius: '8px', padding: '1.5rem', boxShadow: '0 1px 3px rgba(19,33,44,0.1)', display: 'flex', flexDirection: 'column', gap: '0.5rem', cursor: onClick ? 'pointer' : 'default', transition: 'transform 0.2s' }}
    onMouseEnter={e => onClick && (e.currentTarget.style.transform = 'translateY(-2px)')}
    onMouseLeave={e => onClick && (e.currentTarget.style.transform = 'translateY(0)')}>
    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
      <div style={{ flex: 1 }}>
        <div style={{ fontSize: '0.875rem', fontWeight: 500, marginBottom: '0.5rem', opacity: 0.9 }}>{title}</div>
        <div style={{ fontSize: '1.75rem', fontWeight: 600 }}>{value}</div>
        {subtitle && <div style={{ fontSize: '0.875rem', marginTop: '0.5rem', opacity: 0.85 }}>{subtitle}</div>}
      </div>
      {Ic && <Ic size={32} style={{ opacity: 0.8 }} />}
    </div>
    {trend && (
      <div style={{ display: 'flex', alignItems: 'center', gap: '0.25rem', fontSize: '0.875rem', opacity: 0.9 }}>
        {trend.direction === 'up' ? <TrendingUp size={16} /> : <TrendingDown size={16} />}
        <span>{trend.value}</span>
      </div>
    )}
  </div>
);

  const statusMap = { 'Draft': ns.ocean150, 'Pending Approval': ns.yellow, 'Approved': ns.pine, 'Transmitted': ns.ocean60, 'Completed': ns.ocean120, 'Failed': ns.rose, 'Overdue': ns.rose };
  const bg = statusMap[status] || ns.ocean150;
  return (
    <span style={{ background: bg, color: ns.white, padding: small ? '0.125rem 0.5rem' : '0.25rem 0.75rem', borderRadius: '12px', fontSize: small ? '0.6875rem' : '0.75rem', fontWeight: 500, textTransform: 'uppercase', letterSpacing: '0.025em', whiteSpace: 'nowrap', display: 'inline-block' }}>

};

  const totalDiscountAvailable = openInvoices.filter(i => i.hasDiscount).reduce((s, i) => s + i.discountAmt, 0);

  const apHealthScore = 92;

  const avgDPO = useMemo(() => {
    const w = liveData.topVendors.reduce((s, v) => s + v.avgDaysToPay * v.ytdSpend, 0);
    return (w / totalYTDSpend).toFixed(1);
  }, []);

  const workingCapitalMetrics = {
    dpo: parseFloat(avgDPO), dpoTarget: 45,
    dso: 38.5, dsoTarget: 35,
    dio: 25.3,

    freeCashFlow: 2450000, operatingCashFlow: 3200000
  };

  const cashFlowForecast = useMemo(() => {
    const weeks = [];
    let balance = liveData.cashPosition;
    for (let i = 0; i < 13; i++) {
      const inflow  = 450000 + (Math.sin(i * 0.7) * 50000);
      const outflow = 350000 + (Math.cos(i * 0.9) * 40000);
      balance += inflow - outflow;
      weeks.push({ week: 'W' + (i+1), inflow: Math.round(inflow), outflow: Math.round(outflow), balance: Math.round(balance), minimumThreshold: 2000000 });
    }
    return weeks;
  }, []);

  const getInvoiceRecommendation = (inv) => {
    if (inv.status === 'Overdue' || inv.daysUntilDue < 0) return { label: 'OVERDUE',        color: ns.rose };
    if (inv.daysUntilDue <= 1)                             return { label: 'DUE NOW',        color: ns.rose };
    if (inv.hasDiscount && inv.daysUntilDue <= 7)          return { label: 'TAKE DISCOUNT',  color: ns.pine };
    if (inv.daysUntilDue <= 3)                             return { label: 'DUE SOON',       color: ns.yellow };
    if (inv.status === 'Pending Approval')                 return { label: 'NEEDS APPROVAL', color: ns.yellow };
    return { label: 'ON TRACK', color: ns.pine };

    { key: 'approved',         title: 'Approved',         color: ns.pine    },

    { key: 'overdue',          title: 'Overdue',          color: ns.rose    },

    return 'approved';

    openInvoices.forEach(inv => g[getInvoiceColumn(inv)].push(inv));
    return g;
  }, []);

    { id: 'kanban',     label: 'Invoice Workflow',    Icon: CreditCard  },
    { id: 'analytics',  label: 'Deep Analytics',      Icon: TrendingUp  },
    { id: 'vendors',    label: 'Vendor Intelligence', Icon: Users       },
    { id: 'compliance', label: 'Compliance & Risk',   Icon: Shield      },
    { id: 'batches',    label: 'Payment Execution',   Icon: Zap         },

              <MetricCard title="AP Health Score"       value={apHealthScore}                  subtitle="Payment performance"                   Icon={Award}      color={ns.pine} />

          <div style={{ display: 'grid', gap: '1.5rem' }}>
            <div style={card}>
              <h3 style={{ color: ns.ocean180, fontSize: '1.125rem', fontWeight: 600, marginBottom: '1rem' }}>Vendor Performance Scorecard</h3>
              <div style={{ overflowX: 'auto' }}>
                <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: '0.875rem' }}>
                  <thead>
                    <tr style={{ background: ns.ocean10 }}>
                      {['Vendor','Category','YTD Spend','Invoices','Avg Invoice','On-Time %','Avg Days','Discount Rate','Years','Health'].map(h => (
                        <th key={h} style={{ padding: '0.75rem', textAlign: h === 'Vendor' || h === 'Category' ? 'left' : 'center', fontWeight: 600, color: ns.ocean150, borderBottom: '1px solid ' + ns.ocean30, whiteSpace: 'nowrap' }}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {liveData.topVendors.map((v, i) => (
                      <tr key={i} style={{ background: i%2===0 ? ns.white : ns.ocean10, borderBottom: '1px solid ' + ns.ocean30 }}>
                        <td style={{ padding: '0.75rem', color: ns.ocean120, fontWeight: 500 }}>{v.name}</td>
                        <td style={{ padding: '0.75rem', color: ns.ocean150, fontSize: '0.8125rem' }}>{v.category}</td>
                        <td style={{ padding: '0.75rem', textAlign: 'right', color: ns.ocean180, fontWeight: 600 }}>{fmt(v.ytdSpend)}</td>
                        <td style={{ padding: '0.75rem', textAlign: 'center', color: ns.ocean150 }}>{v.invoiceCount}</td>
                        <td style={{ padding: '0.75rem', textAlign: 'right', color: ns.ocean150 }}>{fmt(v.avgInvoice)}</td>
                        <td style={{ padding: '0.75rem', textAlign: 'center', fontWeight: 600, color: v.onTimePercent >= 95 ? ns.pine : v.onTimePercent >= 85 ? ns.yellow : ns.rose }}>{v.onTimePercent}%</td>
                        <td style={{ padding: '0.75rem', textAlign: 'center', color: ns.ocean150 }}>{v.avgDaysToPay}</td>
                        <td style={{ padding: '0.75rem', textAlign: 'center', fontWeight: 600, color: v.discountCaptureRate >= 90 ? ns.pine : v.discountCaptureRate >= 70 ? ns.yellow : ns.rose }}>{v.discountCaptureRate}%</td>
                        <td style={{ padding: '0.75rem', textAlign: 'center', color: ns.ocean150 }}>{v.relationshipYears}</td>
                        <td style={{ padding: '0.75rem', textAlign: 'center' }}>
                          <span style={{ background: v.healthScore === 'A' ? ns.pine : v.healthScore === 'B' ? ns.yellow : ns.rose, color: v.healthScore === 'B' ? ns.ocean180 : ns.white, padding: '0.125rem 0.5rem', borderRadius: '12px', fontSize: '0.6875rem', fontWeight: 600 }}>{v.healthScore}</span>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>

            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '1.5rem' }}>
              <div style={card}>
                <h3 style={{ color: ns.ocean180, fontSize: '1.125rem', fontWeight: 600, marginBottom: '1rem' }}>Vendor Spend Distribution</h3>
                <DonutChart vendors={liveData.topVendors} height={260} />
                <div style={{ marginTop: '1rem', padding: '1rem', background: '#FFF5F5', border: '1px solid ' + ns.rose, borderRadius: '6px' }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem', marginBottom: '0.4rem' }}>
                    <AlertTriangle size={16} color={ns.rose} />
                    <strong style={{ fontSize: '0.875rem', color: ns.ocean180 }}>Concentration Risk Alert</strong>
                  </div>
                  <div style={{ fontSize: '0.875rem', color: ns.ocean150 }}>Top 3 vendors = 62% of spend. Consider diversifying critical services.</div>
                </div>
              </div>

              <div style={card}>
                <h3 style={{ color: ns.ocean180, fontSize: '1.125rem', fontWeight: 600, marginBottom: '1rem' }}>Spend by Category</h3>
                {['IT Services','Professional Services','IT Hardware','Consulting','Services'].map((cat, i) => {
                  const vends = liveData.topVendors.filter(v => v.category === cat);
                  const spend = vends.reduce((s, v) => s + v.ytdSpend, 0);
                  const pct   = (spend / totalYTDSpend) * 100;
                  if (!spend) return null;
                  return (
                    <div key={i} style={{ marginBottom: '1rem' }}>
                      <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '0.4rem' }}>
                        <span style={{ fontSize: '0.875rem', color: ns.ocean180, fontWeight: 500 }}>{cat}</span>
                        <span style={{ fontSize: '0.875rem', color: ns.ocean150, fontWeight: 600 }}>{fmt(spend)} ({pct.toFixed(1)}%)</span>
                      </div>
                      <div style={{ background: ns.ocean10, height: '8px', borderRadius: '4px', overflow: 'hidden' }}>
                        <div style={{ background: chartColors[i % chartColors.length], height: '100%', width: pct + '%' }} />
                      </div>
                      <div style={{ fontSize: '0.75rem', color: ns.ocean150, marginTop: '0.2rem' }}>
                        {vends.length} vendor{vends.length !== 1 ? 's' : ''} · Avg: {fmt(spend / vends.length)}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>

            <div style={card}>
              <h3 style={{ color: ns.ocean180, fontSize: '1.125rem', fontWeight: 600, marginBottom: '1rem' }}>Relationship Health Indicators</h3>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit,minmax(180px,1fr))', gap: '1rem' }}>
                {[
                  { label: 'Avg Relationship Length',  value: (liveData.topVendors.reduce((s,v) => s+v.relationshipYears,0)/liveData.topVendors.length).toFixed(1) + ' years' },
                  { label: 'Overall Discount Capture', value: (liveData.topVendors.reduce((s,v) => s+v.discountCaptureRate,0)/liveData.topVendors.length).toFixed(0) + '%', color: ns.pine },
                  { label: 'Avg On-Time Payment',      value: (liveData.topVendors.reduce((s,v) => s+v.onTimePercent,0)/liveData.topVendors.length).toFixed(1) + '%', color: ns.pine },
                  { label: 'Vendors with A Rating',    value: liveData.topVendors.filter(v => v.healthScore === 'A').length + ' of ' + liveData.topVendors.length, color: ns.pine },
                ].map((m, i) => (
                  <div key={i} style={{ padding: '1rem', background: ns.ocean10, borderRadius: '6px', textAlign: 'center' }}>
                    <div style={{ fontSize: '0.75rem', color: ns.ocean150, marginBottom: '0.25rem' }}>{m.label}</div>
                    <div style={{ fontSize: '1.5rem', fontWeight: 600, color: m.color || ns.ocean120 }}>{m.value}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* ── COMPLIANCE ── */}
        {selectedView === 'compliance' && (
          <div style={{ display: 'grid', gap: '1.5rem' }}>
            <div style={card}>
              <h3 style={{ color: ns.ocean180, fontSize: '1.125rem', fontWeight: 600, marginBottom: '1rem', display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                <Shield size={20} /> Compliance & Controls Dashboard
              </h3>
              <div style={{ display: 'grid', gap: '1rem' }}>
                {[
                  { Icon: CheckCircle, color: ns.pine,   bg: '#F0FFF4', title: 'Segregation of Duties (SoD)',    sub: 'No conflicts detected in last 90 days',              badge: 'COMPLIANT', badgeBg: ns.pine   },
                  { Icon: CheckCircle, color: ns.pine,   bg: '#F0FFF4', title: 'Duplicate Invoice Detection',    sub: '3 duplicates caught · 0 processed · 100% catch rate', badge: 'ACTIVE',    badgeBg: ns.pine   },
                  { Icon: AlertCircle, color: ns.yellow, bg: '#FFFBF0', title: '1099 Reporting Readiness',       sub: '18 vendors requiring 1099 · 2 missing W-9 forms',      badge: 'REVIEW',    badgeBg: ns.yellow },
                  { Icon: CheckCircle, color: ns.pine,   bg: '#F0FFF4', title: '3-Way Match Validation',         sub: '287 of 295 invoices matched · 8 pending review',        badge: '97% RATE',  badgeBg: ns.pine   },
                  { Icon: Database,    color: ns.pine,   bg: '#F0FFF4', title: 'Vendor Master Data Quality',     sub: '142 active vendors · All validated · 0 duplicates',     badge: 'CLEAN',     badgeBg: ns.pine   },
                ].map((item, i) => (
                  <div key={i} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '1rem', background: item.bg, borderRadius: '6px', border: '1px solid ' + item.color }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: '0.75rem' }}>
                      <item.Icon size={24} color={item.color} />
                      <div>
                        <div style={{ fontSize: '0.875rem', fontWeight: 600, color: ns.ocean180 }}>{item.title}</div>
                        <div style={{ fontSize: '0.75rem', color: ns.ocean150 }}>{item.sub}</div>
                      </div>
                    </div>
                    <span style={{ background: item.badgeBg, color: item.badgeBg === ns.yellow ? ns.ocean180 : ns.white, padding: '0.25rem 0.75rem', borderRadius: '12px', fontSize: '0.75rem', fontWeight: 600, whiteSpace: 'nowrap' }}>
                      {item.badge}
                    </span>
                  </div>
                ))}
              </div>
            </div>

            <div style={card}>
              <h3 style={{ color: ns.ocean180, fontSize: '1.125rem', fontWeight: 600, marginBottom: '1rem' }}>YTD 2025 Audit Trail Summary</h3>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit,minmax(160px,1fr))', gap: '1rem' }}>
                {[
                  { value: '2,847', label: 'Bills Processed' },
                  { value: '2,614', label: 'Payments Made' },
                  { value: '4.2',   label: 'Avg Processing Days' },
                  { value: '98.5%', label: 'On-Time Rate',      color: ns.pine },
                  { value: '$127K', label: 'Discounts Captured', color: ns.pine },
                  { value: '92',    label: 'AP Health Score',    color: ns.pine },
                ].map((m, i) => (
                  <div key={i} style={{ padding: '1rem', background: ns.ocean10, borderRadius: '6px', textAlign: 'center' }}>
                    <div style={{ fontSize: '2rem', fontWeight: 600, color: m.color || ns.ocean120 }}>{m.value}</div>
                    <div style={{ fontSize: '0.875rem', color: ns.ocean150 }}>{m.label}</div>
                  </div>
                ))}
              </div>
            </div>

            <div style={card}>
              <h3 style={{ color: ns.ocean180, fontSize: '1.125rem', fontWeight: 600, marginBottom: '1rem' }}>Risk Monitoring</h3>
              <div style={{ display: 'grid', gap: '1rem' }}>
                {[
                  { bg: '#FFF5F5', border: ns.rose,   Icon: AlertTriangle, color: ns.rose,   title: 'Vendor Concentration Risk',   badge: 'HIGH RISK',   badgeBg: ns.rose,   sub: 'Top 3 vendors represent 62% of spend. Single point of failure risk for IT Services and Professional Services.' },
                  { bg: '#FFFBF0', border: ns.yellow, Icon: Clock,         color: ns.yellow, title: 'Payment Terms Opportunity',  badge: 'OPPORTUNITY', badgeBg: ns.yellow, sub: 'Current DPO of ' + avgDPO + ' days is below target of 45 days. Opportunity to extend payment terms.' },
                  { bg: '#F0FFF4', border: ns.pine,   Icon: Award,         color: ns.pine,   title: 'Discount Capture Performance', badge: 'STRONG',     badgeBg: ns.pine,   sub: 'Overall discount capture rate above 75% industry benchmark. YTD savings: $127K. Continue current strategy.' },
                ].map((r, i) => (
                  <div key={i} style={{ padding: '1rem', background: r.bg, borderRadius: '6px', border: '1px solid ' + r.border }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
                      <div style={{ flex: 1 }}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem', marginBottom: '0.4rem' }}>
                          <r.Icon size={20} color={r.color} />
                          <strong style={{ fontSize: '0.875rem', color: ns.ocean180 }}>{r.title}</strong>
                        </div>
                        <div style={{ fontSize: '0.875rem', color: ns.ocean150, lineHeight: 1.5 }}>{r.sub}</div>
                      </div>
                      <span style={{ background: r.badgeBg, color: r.badgeBg === ns.yellow ? ns.ocean180 : ns.white, padding: '0.25rem 0.75rem', borderRadius: '12px', fontSize: '0.75rem', fontWeight: 600, marginLeft: '1rem', whiteSpace: 'nowrap' }}>{r.badge}</span>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* ── BATCHES ── */}
        {selectedView === 'batches' && (
          <div style={{ display: 'grid', gap: '1.5rem' }}>
            <div style={card}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1.5rem' }}>
                <h3 style={{ color: ns.ocean180, fontSize: '1.125rem', fontWeight: 600, margin: 0 }}>Payment Batch Execution Center</h3>
                <div style={{ display: 'flex', gap: '0.5rem' }}>
                  <button style={{ background: ns.pine, color: ns.white, border: 'none', borderRadius: '6px', padding: '0.5rem 1rem', fontSize: '0.875rem', fontWeight: 500, cursor: 'pointer', fontFamily: 'inherit' }}>+ Create ACH Batch</button>
                  <button style={{ background: ns.ocean120, color: ns.white, border: 'none', borderRadius: '6px', padding: '0.5rem 1rem', fontSize: '0.875rem', fontWeight: 500, cursor: 'pointer', fontFamily: 'inherit' }}>Print Checks</button>
                </div>
              </div>
              <div style={{ overflowX: 'auto' }}>
                <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: '0.875rem' }}>
                  <thead>
                    <tr style={{ background: ns.ocean10 }}>
                      {['Batch ID','Date','Method','Invoices','Amount','Status','Approver','Action'].map(h => (
                        <th key={h} style={{ padding: '0.75rem', textAlign: 'left', fontWeight: 600, color: ns.ocean150, borderBottom: '1px solid ' + ns.ocean30, whiteSpace: 'nowrap' }}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {paymentBatches.map((b, i) => (
                      <tr key={i} style={{ background: i%2===0 ? ns.white : ns.ocean10, borderBottom: '1px solid ' + ns.ocean30, cursor: 'pointer' }}
                          onClick={() => setSelectedBatch(b === selectedBatch ? null : b)}>
                        <td style={{ padding: '0.75rem', color: ns.ocean120, fontWeight: 500 }}>{b.id}</td>
                        <td style={{ padding: '0.75rem', color: ns.ocean150 }}>{b.date}</td>
                        <td style={{ padding: '0.75rem' }}>
                          <span style={{ background: b.method === 'ACH' ? ns.ocean60 : ns.yellow, color: ns.white, padding: '0.125rem 0.5rem', borderRadius: '12px', fontSize: '0.6875rem', fontWeight: 500 }}>{b.method}</span>
                        </td>
                        <td style={{ padding: '0.75rem', color: ns.ocean150 }}>{b.invoices}</td>
                        <td style={{ padding: '0.75rem', color: ns.ocean180, fontWeight: 600 }}>{fmt(b.amount)}</td>
                        <td style={{ padding: '0.75rem' }}><StatusBadge status={b.status} small /></td>
                        <td style={{ padding: '0.75rem', color: ns.ocean150, fontSize: '0.8125rem' }}>{b.approver || '—'}</td>
                        <td style={{ padding: '0.75rem' }}>
                          {b.status === 'Draft' && <button style={{ background: 'transparent', color: ns.ocean120, border: '1px solid ' + ns.ocean120, borderRadius: '4px', padding: '0.25rem 0.75rem', fontSize: '0.75rem', cursor: 'pointer', fontFamily: 'inherit' }}>Review</button>}
                          {b.status === 'Pending Approval' && <button style={{ background: ns.pine, color: ns.white, border: 'none', borderRadius: '4px', padding: '0.25rem 0.75rem', fontSize: '0.75rem', cursor: 'pointer', fontFamily: 'inherit' }}>Approve</button>}
                          {b.status === 'Approved' && <button style={{ background: ns.ocean120, color: ns.white, border: 'none', borderRadius: '4px', padding: '0.25rem 0.75rem', fontSize: '0.75rem', cursor: 'pointer', fontFamily: 'inherit' }}>Transmit</button>}
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>

            {selectedBatch && (
              <div style={{ ...card, boxShadow: '0 4px 12px rgba(19,33,44,0.2)' }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1rem' }}>
                  <h3 style={{ color: ns.ocean180, fontSize: '1.125rem', fontWeight: 600, margin: 0 }}>Batch Details: {selectedBatch.id}</h3>
                  <button onClick={() => setSelectedBatch(null)} style={{ background: 'transparent', border: 'none', color: ns.ocean150, fontSize: '1.5rem', cursor: 'pointer', padding: '0.25rem' }}>×</button>
                </div>
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit,minmax(180px,1fr))', gap: '1rem', marginBottom: '1.5rem' }}>
                  {[
                    { label: 'Payment Date',   value: selectedBatch.date },
                    { label: 'Method',         value: selectedBatch.method },
                    { label: 'Total Invoices', value: selectedBatch.invoices },
                    { label: 'Total Amount',   value: fmt(selectedBatch.amount), large: true },
                  ].map((d, i) => (
                    <div key={i}>
                      <div style={{ fontSize: '0.75rem', color: ns.ocean150, marginBottom: '0.25rem' }}>{d.label}</div>
                      <div style={{ fontSize: d.large ? '1.25rem' : '1rem', fontWeight: 600, color: d.large ? ns.ocean120 : ns.ocean180 }}>{d.value}</div>
                    </div>
                  ))}
                </div>
                <div style={{ padding: '1rem', background: ns.ocean10, borderRadius: '6px', marginBottom: '1rem' }}>
                  <div style={{ fontSize: '0.875rem', fontWeight: 600, color: ns.ocean180, marginBottom: '0.4rem' }}>Included Vendors</div>
                  <div style={{ fontSize: '0.875rem', color: ns.ocean150 }}>{selectedBatch.vendors.join(', ')}</div>
                </div>
                {selectedBatch.status === 'Pending Approval' && (
                  <div style={{ display: 'flex', gap: '0.5rem', justifyContent: 'flex-end' }}>
                    <button style={{ background: 'transparent', color: ns.rose, border: '1px solid ' + ns.rose, borderRadius: '6px', padding: '0.5rem 1.5rem', fontSize: '0.875rem', fontWeight: 500, cursor: 'pointer', fontFamily: 'inherit' }}>Reject</button>
                    <button style={{ background: ns.pine, color: ns.white, border: 'none', borderRadius: '6px', padding: '0.5rem 1.5rem', fontSize: '0.875rem', fontWeight: 500, cursor: 'pointer', fontFamily: 'inherit' }}>Approve Batch</button>
                  </div>
                )}
              </div>
            )}
          </div>
        )}

      </div>
    </div>
  );
};

ReactDOM.render(<APCashFlowDashboard />, document.getElementById('root'));
</script>
</body>
</html>
